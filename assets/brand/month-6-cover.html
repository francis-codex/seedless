<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>seedless month 6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1250px;
    height: 500px;
    background: #000000;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1250px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .pretitle {
    font-size: 22px;
    font-weight: 400;
    color: #888;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .month {
    font-size: 220px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -8px;
    line-height: 0.85;
  }

  .subtitle {
    font-size: 24px;
    font-weight: 400;
    color: #888;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .brand {
    position: absolute;
    bottom: 28px;
    right: 36px;
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
  }

  .date {
    position: absolute;
    bottom: 28px;
    left: 36px;
    font-size: 16px;
    font-weight: 400;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="date">June 2026</div>
    <div class="center">
      <div class="pretitle">Welcome to</div>
      <div class="month">MONTH 6</div>
      <div class="subtitle">of building seedless</div>
    </div>
    <div class="brand">seedless</div>
  </div>
</body>
</html>
