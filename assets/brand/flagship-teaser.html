<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>seedless — flagship teaser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
    position: relative;
  }

  .top-mark {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 52px;
  }

  .seedless-logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  }
  .seedless-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .brand { font-size: 36px; font-weight: 800; color: #0a0a0a; letter-spacing: -0.02em; }

  .eyebrow {
    font-size: 24px;
    font-weight: 700;
    color: #12d18e;
    letter-spacing: 0.02em;
    margin-bottom: 22px;
  }

  .headline {
    font-size: 118px;
    font-weight: 900;
    color: #0a0a0a;
    letter-spacing: -0.05em;
    line-height: 0.92;
    margin-bottom: 40px;
  }
  .headline .green { color: #12d18e; }

  .subline {
    font-size: 30px;
    font-weight: 600;
    color: #5b5b5b;
    letter-spacing: -0.01em;
    max-width: 900px;
  }

  .pill {
    position: absolute;
    bottom: 64px;
    left: 96px;
    padding: 14px 28px;
    background: #0a0a0a;
    border-radius: 999px;
    font-size: 20px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-mark">
      <div class="seedless-logo"><img src="seedless-icon.png" alt="seedless" /></div>
      <div class="brand">seedless</div>
    </div>

    <div class="eyebrow">coming soon</div>
    <div class="headline">what's our<br/><span class="green">flagship</span> feature?</div>
    <div class="subline">the one thing every crypto wallet still gets wrong.</div>

    <div class="pill">stay tuned</div>
  </div>
</body>
</html>
