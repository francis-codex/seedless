<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>seedless — 48h update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
    position: relative;
  }

  .top-mark {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 40px;
  }

  .seedless-logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  }
  .seedless-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .brand { font-size: 36px; font-weight: 800; color: #0a0a0a; letter-spacing: -0.02em; }

  .headline {
    font-size: 92px;
    font-weight: 900;
    color: #0a0a0a;
    letter-spacing: -0.045em;
    line-height: 0.94;
    margin-bottom: 44px;
  }

  .rows { display: flex; flex-direction: column; gap: 20px; margin-bottom: 46px; }

  .row { display: flex; align-items: baseline; gap: 18px; }
  .arrow { font-size: 30px; font-weight: 900; color: #12d18e; line-height: 1; }
  .row .label { font-size: 30px; font-weight: 800; color: #0a0a0a; letter-spacing: -0.01em; }
  .row .desc { font-size: 30px; font-weight: 600; color: #5b5b5b; letter-spacing: -0.01em; }

  .pill {
    align-self: flex-start;
    padding: 14px 28px;
    border: 2px solid #0a0a0a;
    border-radius: 999px;
    font-size: 20px;
    font-weight: 800;
    color: #0a0a0a;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-mark">
      <div class="seedless-logo"><img src="seedless-icon.png" alt="seedless" /></div>
      <div class="brand">seedless</div>
    </div>

    <div class="headline">the last<br/>48 hours</div>

    <div class="rows">
      <div class="row"><span class="arrow">&rarr;</span><span class="label">private sends</span><span class="desc">rebuilt on umbra's newest release</span></div>
      <div class="row"><span class="arrow">&rarr;</span><span class="label">gasless swaps</span><span class="desc">going production-ready</span></div>
      <div class="row"><span class="arrow">&rarr;</span><span class="label">play store</span><span class="desc">verification cleared, prepping to ship</span></div>
    </div>

    <div class="pill">no seed phrase &middot; private by default</div>
  </div>
</body>
</html>
