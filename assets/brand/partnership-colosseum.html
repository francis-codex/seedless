<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>seedless × colosseum</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    margin-bottom: 56px;
  }

  .logo-tile {
    width: 200px;
    height: 200px;
    border-radius: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.18),
                0 8px 24px -8px rgba(0, 0, 0, 0.08);
    overflow: hidden;
  }

  .logo-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .logo-tile.colosseum {
    background: #000;
  }
  .logo-tile.colosseum img {
    width: 70%;
    height: 70%;
    object-fit: contain;
  }

  .x {
    font-size: 48px;
    font-weight: 700;
    color: #0a0a0a;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .headline {
    font-size: 84px;
    font-weight: 900;
    letter-spacing: -0.045em;
    color: #0a0a0a;
    line-height: 0.95;
    margin-bottom: 20px;
    text-align: center;
  }

  .subline {
    font-size: 26px;
    font-weight: 700;
    color: #0a0a0a;
    letter-spacing: -0.01em;
    text-align: center;
    margin-bottom: 0;
  }

  .subline .dot {
    color: #9ca3af;
    margin: 0 14px;
    font-weight: 500;
  }

  .footer {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    color: #6b7280;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="logos">
      <div class="logo-tile">
        <img src="logo.png" alt="seedless" />
      </div>
      <div class="x">×</div>
      <div class="logo-tile colosseum">
        <img src="colosseum.png" alt="colosseum" />
      </div>
    </div>

    <div class="headline">in the arena</div>
    <div class="subline">
      mainnet live<span class="dot">·</span>privacy shipped<span class="dot">·</span>frontier bound
    </div>

    <div class="footer">seedless × colosseum  ·  frontier hackathon  ·  one week out</div>
  </div>
</body>
</html>
