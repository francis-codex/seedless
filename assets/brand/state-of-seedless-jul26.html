<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>state of seedless — july 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 88px 80px;
  }

  .top-mark {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 56px;
  }

  .seedless-logo {
    width: 84px;
    height: 84px;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0,0,0,0.12);
  }

  .seedless-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .brand {
    font-size: 36px;
    font-weight: 800;
    color: #0a0a0a;
    letter-spacing: -0.02em;
  }

  .headline {
    font-size: 124px;
    font-weight: 900;
    color: #0a0a0a;
    letter-spacing: -0.05em;
    line-height: 0.92;
    text-align: center;
  }

  .date {
    margin-top: 28px;
    font-size: 40px;
    font-weight: 700;
    color: #6b6b6b;
    letter-spacing: -0.01em;
  }

  .partners-label {
    margin-top: 88px;
    font-size: 18px;
    font-weight: 700;
    color: #9a9a9a;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .partners {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
    margin-top: 24px;
  }

  .partner-tile {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,0.10);
    background: #ffffff;
  }

  .partner-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-mark">
      <div class="seedless-logo"><img src="seedless-icon.png" alt="seedless" /></div>
      <div class="brand">seedless</div>
    </div>

    <div class="headline">state of seedless</div>
    <div class="date">july 2026</div>

    <div class="partners-label">partner stack</div>
    <div class="partners">
      <div class="partner-tile"><img src="lazorkit.png" alt="lazorkit" /></div>
      <div class="partner-tile"><img src="umbra.png" alt="umbra" /></div>
      <div class="partner-tile"><img src="jupiter.png" alt="jupiter" /></div>
      <div class="partner-tile"><img src="alchemy.png" alt="alchemy" /></div>
      <div class="partner-tile"><img src="ika.png" alt="ika" /></div>
    </div>
  </div>
</body>
</html>
