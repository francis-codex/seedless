<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>#GoSeedless</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 1280px;
    height: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .top-mark {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .seedless-logo {
    width: 80px;
    height: 80px;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0,0,0,0.12);
  }

  .seedless-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .brand {
    font-size: 38px;
    font-weight: 800;
    color: #0a0a0a;
    letter-spacing: -0.02em;
  }

  .hashtag {
    font-size: 156px;
    font-weight: 900;
    color: #0a0a0a;
    letter-spacing: -0.06em;
    line-height: 0.9;
    margin-bottom: 24px;
  }

  .prize-row {
    display: flex;
    align-items: stretch;
    gap: 28px;
    margin-top: 12px;
  }

  .prize-tile {
    padding: 22px 36px;
    border: 2px solid #0a0a0a;
    border-radius: 18px;
    text-align: center;
  }

  .prize-tile.solid {
    background: #0a0a0a;
    color: #ffffff;
  }

  .prize-amount {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .prize-label {
    margin-top: 6px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.85;
  }

</style>
</head>
<body>
  <div class="frame">
    <div class="top-mark">
      <div class="seedless-logo"><img src="seedless-icon.png" alt="seedless" /></div>
      <div class="brand">seedless</div>
    </div>

    <div class="hashtag">#GoSeedless</div>

    <div class="prize-row">
      <div class="prize-tile">
        <div class="prize-amount">25 × $5</div>
        <div class="prize-label">random winners</div>
      </div>
      <div class="prize-tile solid">
        <div class="prize-amount">3 × $15</div>
        <div class="prize-label">best reports</div>
      </div>
    </div>
  </div>
</body>
</html>
