<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedless x Alliance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1200px;
    height: 675px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px;
    position: relative;
    overflow: hidden;
  }
  /* Subtle dark gradient like Alliance banner */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(20,20,30,0.8) 0%, transparent 50%, rgba(15,15,25,0.6) 100%);
  }
  .content { position: relative; z-index: 1; }
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 72px;
    font-weight: 700;
    color: #c8e6ff;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .subtitle {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 28px;
    color: #a3d977;
    margin-bottom: 48px;
  }
  .desc {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    max-width: 650px;
  }
  .logo-row {
    position: absolute;
    bottom: 48px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  .seedless-logo {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .alliance-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alliance-icon {
    width: 32px;
    height: 32px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .alliance-icon svg { width: 20px; height: 20px; }
  .alliance-text {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <h1>Seedless Applied<br>to ALL17</h1>
    <div class="subtitle">Passkey wallet on Solana. No seed phrases.</div>
    <div class="desc">Solo-built. Audited. Beta live. Building the wallet that makes seed phrases obsolete.</div>
  </div>
  <div class="logo-row">
    <div class="seedless-logo">seedlesslabs.xyz</div>
    <div class="alliance-logo">
      <div class="alliance-icon">
        <svg viewBox="0 0 100 100" fill="#000"><path d="M50 10 L15 75 Q50 55 85 75 Z"/></svg>
      </div>
      <div class="alliance-text">ALLIANCE</div>
    </div>
  </div>
</div>
</body>
</html>
