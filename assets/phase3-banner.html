<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1200px;
    height: 675px;
    background: #0a0a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .glow-pink { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(236,72,153,0.14) 0%, transparent 70%); top: 20%; left: 20%; transform: translate(-50%, -50%); }
  .glow-blue { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(96,165,250,0.14) 0%, transparent 70%); bottom: 10%; right: 15%; transform: translate(50%, 50%); }
  .glow-purple { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(168,130,255,0.18) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .content { position: relative; z-index: 1; }
  .phase {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 600;
    background: linear-gradient(90deg, #ec4899, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 68px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }
  .sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 24px;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
  }
  .bottom {
    position: absolute;
    bottom: 32px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-pink"></div>
  <div class="glow-blue"></div>
  <div class="glow-purple"></div>
  <div class="content">
    <div class="phase">Phase 3</div>
    <h1>Public Beta Testing<br>Incoming</h1>
    <div class="sub">Your face is your wallet.</div>
  </div>
  <div class="bottom">@seedless_wallet</div>
</div>
</body>
</html>
