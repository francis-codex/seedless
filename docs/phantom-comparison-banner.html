<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seedless — 2017 vs 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .banner {
    width: 1200px;
    height: 675px;
    background: #0a0a0a;
    border-radius: 24px;
    padding: 0;
    position: relative;
    overflow: hidden;
    display: flex;
  }

  .side {
    flex: 1;
    padding: 72px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .side.left {
    background: radial-gradient(circle at 30% 30%, #1a1a1a 0%, #0a0a0a 70%);
    border-right: 1px solid #1f1f1f;
  }

  .side.right {
    background: radial-gradient(circle at 70% 30%, #1a0b2e 0%, #0a0a0a 70%);
  }

  .side.right::after {
    content: '';
    position: absolute;
    top: -30%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .era {
    color: #555;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  .side.right .era {
    color: #a78bfa;
  }

  .name {
    color: #fff;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 36px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex: 1;
  }

  .step {
    color: #999;
    font-size: 19px;
    font-weight: 500;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .side.right .step { color: #d4d4d4; }

  .num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #666;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .side.right .num {
    background: rgba(139, 92, 246, 0.2);
    color: #c4b5fd;
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .verdict {
    color: #555;
    font-size: 14px;
    font-weight: 500;
    font-style: italic;
    margin-top: 20px;
  }

  .side.right .verdict {
    color: #a78bfa;
    font-weight: 600;
    font-style: normal;
  }

  .vs {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    z-index: 10;
  }

  .footer {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    color: #444;
    font-size: 12px;
    font-weight: 500;
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="side left">
      <div>
        <div class="era">Built for 2017</div>
        <div class="name">Phantom</div>
        <div class="steps">
          <div class="step"><span class="num">1</span>Install browser extension</div>
          <div class="step"><span class="num">2</span>Write 12 words on paper</div>
          <div class="step"><span class="num">3</span>Hide them somewhere safe</div>
          <div class="step"><span class="num">4</span>Hope you never lose them</div>
        </div>
      </div>
      <div class="verdict">Works. But it shows its age.</div>
    </div>

    <div class="side right">
      <div>
        <div class="era">Built for 2026</div>
        <div class="name">Seedless</div>
        <div class="steps">
          <div class="step"><span class="num">1</span>Open the app</div>
          <div class="step"><span class="num">2</span>Use Face ID</div>
          <div class="step"><span class="num">3</span>You're in</div>
        </div>
      </div>
      <div class="verdict">No phrase. No paper. No fear.</div>
    </div>

    <div class="vs">VS</div>
    <div class="footer">@seedless_wallet</div>
  </div>
</body>
</html>
