<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seedless — The Movement</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }
  .banner {
    width: 1200px;
    height: 675px;
    background: linear-gradient(160deg, #0a0a0a 0%, #0f1a0f 40%, #0a0a0a 100%);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    z-index: 2;
  }
  .logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    object-fit: cover;
  }
  .brand {
    color: #fff;
    font-weight: 700;
    font-size: 18px;
  }
  .seed-badge {
    margin-left: 12px;
    color: #22c55e;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 14px;
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 999px;
    background: rgba(34, 197, 94, 0.08);
  }
  h1 {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -3px;
    line-height: 1.05;
    z-index: 2;
    margin-bottom: 28px;
  }
  h1 .green {
    color: #22c55e;
  }
  .features {
    display: flex;
    gap: 32px;
    z-index: 2;
    margin-bottom: 40px;
  }
  .feat {
    color: #888;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feat .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .cta {
    color: #22c55e;
    font-size: 18px;
    font-weight: 700;
  }
  .handle {
    color: #555;
    font-size: 13px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="logo-row">
      <img class="logo" src="../assets/icon.png" alt="Seedless" />
      <div class="brand">Seedless</div>
      <div class="seed-badge">$SEED</div>
    </div>
    <h1>Not just a wallet.<br/>A <span class="green">movement.</span></h1>
    <div class="features">
      <div class="feat"><span class="dot"></span>Passkey-native</div>
      <div class="feat"><span class="dot"></span>Gasless</div>
      <div class="feat"><span class="dot"></span>No seed phrase</div>
      <div class="feat"><span class="dot"></span>$SEED live on Bags</div>
    </div>
    <div class="bottom">
      <div class="cta">Phase 4 is live.</div>
      <div class="handle">@seedless_wallet</div>
    </div>
  </div>
</body>
</html>
