<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seedless — Builder Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }
  .banner {
    width: 1200px;
    height: 675px;
    background: linear-gradient(160deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
    pointer-events: none;
  }
  .tag {
    color: #666;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 32px;
    z-index: 2;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1.15;
    z-index: 2;
    margin-bottom: 36px;
    max-width: 800px;
  }
  h1 .dim {
    color: #555;
  }
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 2;
    margin-bottom: 40px;
  }
  .timeline-item {
    display: flex;
    align-items: center;
    gap: 16px;
    color: #999;
    font-size: 18px;
    font-weight: 500;
  }
  .timeline-item .line {
    width: 40px;
    height: 2px;
    background: #333;
    flex-shrink: 0;
  }
  .timeline-item.active {
    color: #fff;
  }
  .timeline-item.active .line {
    background: #fff;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .seed {
    color: #888;
    font-size: 15px;
    font-weight: 600;
  }
  .seed span {
    color: #fff;
  }
  .handle {
    color: #555;
    font-size: 13px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="tag">6 months of building</div>
    <h1>The SDK is upgrading.<br/>The brand is changing.<br/>The fundraise is <span class="dim">loading.</span></h1>
    <div class="timeline">
      <div class="timeline-item active"><span class="line"></span>Phase 4 — started</div>
      <div class="timeline-item"><span class="line"></span>LazorKit v2.1.0 — shipping</div>
      <div class="timeline-item"><span class="line"></span>Rebrand — this week</div>
      <div class="timeline-item"><span class="line"></span>Futardio fundraise — prepping</div>
    </div>
    <div class="bottom">
      <div class="seed"><span>$SEED</span> holders have been here through it all.</div>
      <div class="handle">@francis_codex</div>
    </div>
  </div>
</body>
</html>
