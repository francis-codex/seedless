<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seedless Mainnet Update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .banner {
    width: 1200px;
    height: 675px;
    background: radial-gradient(circle at 20% 20%, #1a0b2e 0%, #0a0a0a 60%);
    border-radius: 24px;
    padding: 72px 80px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .banner::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(167, 139, 250, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 2;
  }

  .logo {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    object-fit: cover;
  }

  .brand {
    color: #fff;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.3px;
  }

  .tag {
    margin-left: auto;
    color: #a78bfa;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 6px 14px;
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 999px;
    background: rgba(139, 92, 246, 0.08);
  }

  .content {
    position: relative;
    z-index: 2;
  }

  h1 {
    color: #fff;
    font-size: 68px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 36px;
  }

  h1 .highlight {
    background: linear-gradient(135deg, #a78bfa 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .status-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 16px;
    color: #e5e5e5;
    font-size: 20px;
    font-weight: 500;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.done { background: #22c55e; box-shadow: 0 0 16px rgba(34, 197, 94, 0.5); }
  .dot.progress { background: #eab308; box-shadow: 0 0 16px rgba(234, 179, 8, 0.5); }
  .dot.wait { background: #8b5cf6; box-shadow: 0 0 16px rgba(139, 92, 246, 0.5); }

  .status strong { color: #fff; font-weight: 600; margin-right: 6px; }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .footer-text {
    color: #a78bfa;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .handle {
    color: #666;
    font-size: 14px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="header">
      <img class="logo" src="../assets/icon.png" alt="Seedless" />
      <div class="brand">Seedless</div>
      <div class="tag">Mainnet Update</div>
    </div>

    <div class="content">
      <h1>Doing it <span class="highlight">right</span>.<br/>Not fast.</h1>
      <div class="status-list">
        <div class="status"><div class="dot done"></div><strong>On-chain audit</strong> Complete</div>
        <div class="status"><div class="dot progress"></div><strong>SDK audit</strong> In transition, new lead onboarded</div>
        <div class="status"><div class="dot wait"></div><strong>Foundation review</strong> Evaluating ecosystem strategies</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-text">Building doesn't stop.</div>
      <div class="handle">@seedless_wallet</div>
    </div>
  </div>
</body>
</html>
