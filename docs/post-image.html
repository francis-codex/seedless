<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>seedless × umbra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Each .card is one image. Open in browser, screenshot just the card. */
  .card {
    width: 1200px;
    height: 675px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    padding: 0 80px;
    margin: 32px auto;
    position: relative;
    overflow: hidden;
  }

  .logos {
    display: flex;
    align-items: center;
    gap: 64px;
  }

  .logo {
    width: 180px;
    height: 180px;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 100, 200, 0.22), 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  .logo img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .multiply {
    font-size: 72px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1;
    letter-spacing: -3px;
  }

  .tagline {
    margin-top: 64px;
    font-size: 56px;
    font-weight: 900;
    color: #0a0a0a;
    letter-spacing: -2px;
    text-align: center;
    line-height: 1.05;
  }

  .sub {
    margin-top: 20px;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a1a;
    text-align: center;
    letter-spacing: -0.4px;
  }

  .footer {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: #555;
    letter-spacing: 1.2px;
    text-transform: lowercase;
  }

  /* Variant B: dark version */
  .card.dark {
    background: #0a0a0a;
  }
  .card.dark .multiply { color: #f0f0f0; }
  .card.dark .tagline { color: #ffffff; }
  .card.dark .sub { color: #e0e0e0; }
  .card.dark .footer { color: #aaa; }
  .card.dark .logo {
    box-shadow: 0 12px 40px rgba(0, 200, 255, 0.32), 0 2px 8px rgba(255, 255, 255, 0.05);
  }

  .label {
    color: #888;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 12px 0 4px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="label">light · 1200×675 · for X / general</div>
<div class="card">
  <div class="logos">
    <div class="logo"><img src="../assets/brand/rebranded_logo.png" alt="seedless"></div>
    <span class="multiply">×</span>
    <div class="logo"><img src="../assets/brand/umbra_logo.png" alt="umbra"></div>
  </div>
  <div class="tagline">privacy under the hood</div>
  <div class="sub">encrypted accounts · shielded balances · anonymous send</div>
  <div class="footer">seedless × umbra</div>
</div>

<div class="label">dark · 1200×675 · alt</div>
<div class="card dark">
  <div class="logos">
    <div class="logo"><img src="../assets/brand/rebranded_logo.png" alt="seedless"></div>
    <span class="multiply">×</span>
    <div class="logo"><img src="../assets/brand/umbra_logo.png" alt="umbra"></div>
  </div>
  <div class="tagline">privacy under the hood</div>
  <div class="sub">encrypted accounts · shielded balances · anonymous send</div>
  <div class="footer">seedless × umbra</div>
</div>

</body>
</html>
