<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1024px;height:500px;overflow:hidden;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .frame{width:1024px;height:500px;background:radial-gradient(120% 140% at 82% 18%, rgba(0,174,255,0.22) 0%, rgba(0,0,0,0) 55%), #000;
         display:flex;align-items:center;justify-content:space-between;padding:0 72px;position:relative;}
  .glow{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:520px;height:520px;
        background:radial-gradient(circle, rgba(0,174,255,0.35) 0%, rgba(0,174,255,0) 65%);filter:blur(10px);}
  .left{position:relative;z-index:2;max-width:560px;}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:30px;}
  .brand img{width:64px;height:64px;border-radius:16px;}
  .brand span{color:#fff;font-weight:900;font-size:40px;letter-spacing:-0.02em;}
  h1{color:#fff;font-weight:900;font-size:52px;line-height:1.04;letter-spacing:-0.03em;}
  h1 .a{color:#00aeff;}
  p{color:#a8b3c7;font-weight:600;font-size:22px;margin-top:20px;line-height:1.4;}
  .chips{display:flex;gap:12px;margin-top:28px;}
  .chip{color:#cfe9ff;border:1px solid rgba(0,174,255,0.5);background:rgba(0,174,255,0.08);
        border-radius:999px;padding:8px 16px;font-weight:600;font-size:16px;}
  .logo-big{position:relative;z-index:2;}
  .logo-big img{width:230px;height:230px;border-radius:52px;box-shadow:0 30px 80px -20px rgba(0,174,255,0.6);}
</style></head>
